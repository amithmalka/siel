name: Notifications Cron

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call notifications endpoint
        env:
          BACKOFFICE_URL: ${{ secrets.BACKOFFICE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -sS -o response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${BACKOFFICE_URL}/api/cron/notifications")
          echo "HTTP ${response}"
          cat response.txt
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            exit 1
          fi
